<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 50" role="img" aria-label="FORMAN">
  <defs>
    <linearGradient id="fmBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4C92"/>
      <stop offset="1" stop-color="#28B7E0"/>
    </linearGradient>
    <linearGradient id="fmOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F58220"/>
      <stop offset="1" stop-color="#F04E23"/>
    </linearGradient>
  </defs>
  <!-- Carre gauche : bleu + facette cyan/teal en bas a gauche -->
  <g>
    <rect x="0" y="0" width="48" height="48" fill="url(#fmBlue)"/>
    <polygon points="0,48 0,20 26,48" fill="#12B89A"/>
    <polygon points="48,0 48,26 22,0" fill="#0E4C92" opacity="0.55"/>
  </g>
  <!-- Carre droit : M multicolore (magenta / jaune / orange) -->
  <g>
    <polygon points="56,0 80,0 80,48 56,48" fill="#EC008C"/>
    <polygon points="80,0 104,0 104,48 80,48" fill="#FFC20E"/>
    <polygon points="56,48 80,26 104,48" fill="url(#fmOrange)"/>
    <polygon points="80,0 80,26 68,10" fill="#D4007A" opacity="0.45"/>
  </g>
</svg>
