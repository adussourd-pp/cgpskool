<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Chart.js Print</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
body{font-family:Inter,system-ui,sans-serif;background:#ECEAE6;padding:40px}
.section{display:none;background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px;max-width:794px;margin:20px auto}
.section.active{display:block}
.btn{padding:10px 20px;background:#D4622A;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;margin:5px}
.btn.green{background:#2D7A5B}
.btn.blue{background:#185FA5}
#log{background:#fff;border:1px solid #ddd;border-radius:8px;padding:15px;max-width:794px;margin:20px auto;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:300px;overflow-y:auto}
h2{text-align:center;color:#181614}

@media print{
  body{background:#fff}
  .no-print{display:none!important}
  .section{display:block!important;border:none;box-shadow:none;page-break-before:always}
  .section:first-of-type{page-break-before:auto}
}
</style>
</head>
<body>

<h2 class="no-print">Test Chart.js Print - Debug</h2>

<div class="no-print" style="text-align:center;margin-bottom:20px">
  <button class="btn" onclick="showSection('a')">Section A (texte)</button>
  <button class="btn" onclick="showSection('b')">Section B (graphe)</button>
  <button class="btn green" onclick="testPrint1()">Test 1 : Print direct</button>
  <button class="btn blue" onclick="testPrint2()">Test 2 : Canvas to IMG puis print</button>
  <button class="btn" style="background:#7B4FA6" onclick="testPrint3()">Test 3 : Force render + IMG + print</button>
</div>

<div id="log" class="no-print">Logs :</div>

<!-- Section A : texte simple -->
<div class="section active" id="secA">
  <h3>Section A - Texte</h3>
  <p>Cette section contient juste du texte. Elle est visible.</p>
</div>

<!-- Section B : contient le graphe (cachée par défaut) -->
<div class="section" id="secB">
  <h3>Section B - Graphe</h3>
  <div style="position:relative;height:300px">
    <canvas id="testChart"></canvas>
  </div>
  <p>Si tu vois les courbes ici, le chart est rendu.</p>
</div>

<script>
var chartInst=null;
var chartCreated=false;

function log(msg){
  var el=document.getElementById('log');
  el.textContent+='\n'+new Date().toLocaleTimeString()+' | '+msg;
  el.scrollTop=el.scrollHeight;
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec'+id.toUpperCase()).classList.add('active');
  if(id==='b'&&!chartCreated)createChart();
  log('Section '+id.toUpperCase()+' active');
}

function createChart(){
  log('Cr\u00e9ation du chart...');
  var ctx=document.getElementById('testChart');
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:[65,60,55,50,45,40,35,30],
      datasets:[
        {label:'Sal. cadre',data:[62,60,58,56,55,54,52,48],borderColor:'#2B5EA7',borderWidth:2,tension:0.3,fill:false},
        {label:'TNS lib.',data:[85,75,70,65,60,55,50,45],borderColor:'#5D9E4B',borderWidth:2,tension:0.3,fill:false},
        {label:'Fonctionnaire',data:[75,72,68,65,62,60,58,55],borderColor:'#7B4FA6',borderWidth:2,tension:0.3,fill:false}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{position:'bottom'}},
      scales:{
        x:{title:{display:true,text:'Age'}},
        y:{min:30,max:100,title:{display:true,text:'Taux %'}}
      }
    }
  });
  chartCreated=true;
  var canvas=document.getElementById('testChart');
  log('Chart cr\u00e9\u00e9. Canvas: w='+canvas.width+' h='+canvas.height);
}

// TEST 1 : Print direct (sans conversion)
function testPrint1(){
  log('--- TEST 1 : Print direct ---');
  var canvas=document.getElementById('testChart');
  log('Canvas avant print: w='+canvas.width+' h='+canvas.height);
  log('ChartInst existe: '+(!!chartInst));
  // Rendre toutes les sections visibles
  document.querySelectorAll('.section').forEach(s=>s.style.display='block');
  window.print();
  setTimeout(function(){
    // Remettre
    document.querySelectorAll('.section').forEach(s=>s.style.display='');
    log('Print termin\u00e9');
  },2000);
}

// TEST 2 : Convertir canvas en IMG puis print
function testPrint2(){
  log('--- TEST 2 : Canvas to IMG ---');
  var canvas=document.getElementById('testChart');
  log('Canvas: w='+canvas.width+' h='+canvas.height);

  if(canvas.width===0||canvas.height===0){
    log('PROBLEME : canvas a une taille 0 ! Le chart na jamais ete rendu.');
    log('Solution : visiter Section B dabord, ou forcer le render.');
    return;
  }

  try{
    var url=canvas.toDataURL('image/png');
    log('toDataURL: '+url.length+' chars');
    var img=document.createElement('img');
    img.src=url;
    img.style.cssText='width:100%;max-width:100%;height:auto;display:block';
    canvas.parentNode.insertBefore(img,canvas);
    canvas.style.display='none';
    log('IMG inseree, canvas masque');
  }catch(e){
    log('ERREUR toDataURL: '+e.message);
  }

  document.querySelectorAll('.section').forEach(s=>s.style.display='block');
  window.print();
  setTimeout(function(){
    // Restaurer
    var img=canvas.parentNode.querySelector('img');
    if(img)img.remove();
    canvas.style.display='';
    document.querySelectorAll('.section').forEach(s=>s.style.display='');
    log('Restaure');
  },2000);
}

// TEST 3 : Force render (si jamais visite) + IMG + print
function testPrint3(){
  log('--- TEST 3 : Force render + IMG ---');
  var canvas=document.getElementById('testChart');
  var secB=document.getElementById('secB');

  // Etape 1 : rendre la section visible si cache
  if(canvas.width===0){
    log('Canvas w=0 -> force render');
    // Methode A : display:block
    secB.style.display='block';
    createChart();
    log('Chart recree. Canvas: w='+canvas.width+' h='+canvas.height);
  } else {
    log('Canvas deja rendu: w='+canvas.width+' h='+canvas.height);
  }

  // Etape 2 : attendre le rendu
  setTimeout(function(){
    if(chartInst){chartInst.resize();chartInst.update('none');}
    log('Apres resize+update: w='+canvas.width+' h='+canvas.height);

    // Etape 3 : capturer
    setTimeout(function(){
      try{
        var url=canvas.toDataURL('image/png');
        log('toDataURL: '+url.length+' chars (>1000 = contenu OK)');
        var img=document.createElement('img');
        img.src=url;
        img.style.cssText='width:100%;max-width:100%;height:auto;display:block';
        canvas.parentNode.insertBefore(img,canvas);
        canvas.style.display='none';
        log('IMG inseree');
      }catch(e){
        log('ERREUR: '+e.message);
      }

      // Etape 4 : print
      document.querySelectorAll('.section').forEach(s=>s.style.display='block');
      window.print();
      setTimeout(function(){
        var img2=canvas.parentNode.querySelector('img');
        if(img2)img2.remove();
        canvas.style.display='';
        document.querySelectorAll('.section').forEach(s=>s.style.display='');
        log('Restaure');
      },2000);
    },500);
  },500);
}

log('Page chargee. Section A active. Section B cachee (display:none).');
log('Le chart na PAS encore ete cree.');
</script>

</body>
</html>
